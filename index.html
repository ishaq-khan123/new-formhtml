<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Application Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-container">
        <h1>Job Application <span>(Web)</span></h1>

        First Name : <input type="text" placeholder="Enter First Name..." required size="40">
        Last Name :  <input type="text" placeholder="Enter Last Name..." required size="40"><br><br><br>
        Email :  <input type="email" placeholder="John@examplemail.com" required size="40">
        <label class="label-for" for="Job" required >Job Position : </label>
        <select>
            <option value="Civil engineer">Civil Engineer</option>
            <option value="mechinical engineer">Mechinical Engineer</option>
            <option value="Software Engineer">Software Engineer</option>
            <option value="Office Manager">Office Manager</option>
            <option value="Trainer">Trainer</option>
            <option value="Head Coach">Head Coach</option>
        </select>
    </div>
</body>
</html>
